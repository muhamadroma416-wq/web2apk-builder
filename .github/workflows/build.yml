name: Build Flutter APK
run-name: Build ${{ github.event.inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Flutter'
        required: true
        type: string
      tag:
        description: 'Tag/identifier build'
        required: true
        type: string
      build_type:
        description: 'debug atau release'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download project ZIP
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          mkdir project
          unzip -q project.zip -d project

      - name: Cari folder pubspec.yaml
        id: findroot
        run: |
          ROOT=$(find project -name "pubspec.yaml" -printf '%h\n' | head -n1)
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Perbaiki versi font_awesome_flutter yang sudah tidak kompatibel
        working-directory: ${{ steps.findroot.outputs.root }}
        run: |
          if grep -q "font_awesome_flutter" pubspec.yaml; then
            sed -i -E 's/^([[:space:]]*font_awesome_flutter[[:space:]]*:).*/\1 ^11.0.0/' pubspec.yaml
            echo "font_awesome_flutter diupdate ke ^11.0.0"
          fi
          rm -f pubspec.lock

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter pub get

      - name: Build APK (debug)
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter build apk --debug

      - name: Build APK (release)
        if: ${{ github.event.inputs.build_type != 'debug' }}
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter build apk --release

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.tag }}
          path: ${{ steps.findroot.outputs.root }}/build/app/outputs/flutter-apk/*.apk
