name: Build Web2APK
run-name: Web2APK ${{ github.event.inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL website yang mau dibungkus jadi APK'
        required: true
        type: string
      app_name:
        description: 'Nama aplikasi'
        required: true
        type: string
      icon_url:
        description: 'URL icon aplikasi (png), boleh kosong'
        required: false
        type: string
      tag:
        description: 'Tag/identifier build'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Buat project Capacitor
        run: |
          mkdir webapp && cd webapp
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Halaman kosong sebagai starting point, nanti dioverride oleh server.url
          mkdir www
          echo "<html><body>Loading...</body></html>" > www/index.html

          APP_ID="com.webapk.$(echo "${{ github.event.inputs.tag }}" | tr -cd 'a-zA-Z0-9' | tr '[:upper:]' '[:lower:]')"

          cat > capacitor.config.json << EOF
          {
            "appId": "$APP_ID",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "server": {
              "url": "${{ github.event.inputs.web_url }}",
              "cleartext": true
            }
          }
          EOF

          npx cap add android

      - name: Ganti icon aplikasi (kalau ada icon_url)
        if: ${{ github.event.inputs.icon_url != '' }}
        run: |
          cd webapp
          curl -L "${{ github.event.inputs.icon_url }}" -o icon.png
          for dir in android/app/src/main/res/mipmap-*; do
            cp icon.png "$dir/ic_launcher.png" 2>/dev/null || true
            cp icon.png "$dir/ic_launcher_round.png" 2>/dev/null || true
          done

      - name: Build APK (debug/unsigned)
        run: |
          cd webapp/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.tag }}
          path: webapp/android/app/build/outputs/apk/debug/*.apk
          for dir in android/app/src/main/res/mipmap-*; do
            cp icon.png "$dir/ic_launcher.png" 2>/dev/null || true
            cp icon.png "$dir/ic_launcher_round.png" 2>/dev/null || true
          done

      - name: Build APK (debug/unsigned)
        run: |
          cd webapp/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.tag }}
          path: webapp/android/app/build/outputs/apk/debug/*.apk
